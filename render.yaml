services:
  - type: web
    name: ai-detector-api
    plan: free
    env: docker
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: AIDETECTOR_DEVICE
        value: cpu
      - key: AIDETECTOR_MODE_PROFILE
        value: balanced
      - key: AIDETECTOR_FUSION_MODEL_PATH
        value: /app/models/fusion_model.json
